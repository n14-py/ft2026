<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control de Goles</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #141419;
            color: #f5f5f7;
            padding: 40px;
            margin: 0;
        }
        .container {
            max-width: 950px;
            margin: 0 auto;
            background: #1e1e24;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        h1 { color: #00ffcc; margin-top: 0; text-align: center; }
        
        /* Caja de Conexión Live */
        .live-box {
            background: #2b1b3d;
            border: 2px solid #ff0050;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .live-box input {
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ff0050;
            background: #141419;
            color: #fff;
            width: 250px;
            font-weight: bold;
        }
        .btn-live {
            padding: 10px 20px;
            background: #ff0050;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
        .btn-live:hover { background: #cc0040; }
        #status-text {
            font-size: 18px;
            font-weight: bold;
            color: #888;
        }

        /* Caja de Pruebas Manuales */
        .config-box {
            background: #282830;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .config-box input {
            padding: 10px;
            font-size: 15px;
            border-radius: 5px;
            border: 1px solid #444;
            background: #141419;
            color: #fff;
            width: 200px;
        }
        .action-btn {
            padding: 10px 15px;
            background: #4a4e69;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .action-btn:hover { background: #5a5f80; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 15px;
        }
        .btn-test {
            padding: 15px;
            background: #2d3047;
            color: white;
            border: 2px solid #3c405c;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }
        .btn-test:hover {
            border-color: #00ffcc;
            background: #343854;
            transform: translateY(-2px);
        }
        .player {
            display: block;
            font-size: 12px;
            color: #a0a5c0;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎛️ Centro de Control - TikTok Goles</h1>
        
        <!-- PANEL DE CONEXIÓN A TIKTOK -->
        <div class="live-box">
            <label><strong>📡 Conectar al Directo:</strong></label>
            <input type="text" id="input-tiktok" value="futbolmundial2026_">
            <button class="btn-live" onclick="conectarTikTok()">▶️ Conectar</button>
            <span id="status-text">⚪ Esperando orden...</span>
        </div>

        <hr style="border: 1px solid #333; margin-bottom: 20px;">

        <!-- PANEL DE PRUEBAS -->
        <h3>🧪 Pruebas Manuales (Sin estar en Live)</h3>
        <div class="config-box">
            <label>Simular espectador:</label>
            <input type="text" id="input-user" value="Fanatico_Py99">
            <button class="action-btn" onclick="cambiarNombre()">🎲 Nombre Azar</button>
        </div>

        <div class="grid" id="grid-botones"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        // 1. Lógica de Conexión a TikTok
        function conectarTikTok() {
            const username = document.getElementById('input-tiktok').value.trim();
            if (!username) return alert("Escribe un nombre de usuario");
            
            document.getElementById('status-text').style.color = '#ffcc00';
            document.getElementById('status-text').innerText = '⏳ Conectando...';
            
            socket.emit('iniciar-conexion-tiktok', username);
        }

        // Recibir respuesta del servidor sobre la conexión
        socket.on('estado-conexion', (data) => {
            const statusEl = document.getElementById('status-text');
            statusEl.innerText = data.status;
            statusEl.style.color = data.color;
        });


        // 2. Lógica de los botones de prueba
        const regalosActivos = [
            { gift: 'Rose', player: 'Matías Galarza' },
            { gift: 'Doughnut', player: 'Maurício' },
            { gift: 'TikTok', player: 'Lionel Messi' },
            { gift: 'Ice Cream', player: 'Luis Díaz' },
            { gift: 'Panda', player: 'Raúl Jiménez' },
            { gift: 'Love Letter', player: 'Luis Romo' },
            { gift: 'Perfume', player: 'Julián Quiñones' },
            { gift: 'Corgi', player: 'Maximiliano Araújo' },
            { gift: 'Mirror', player: 'Jaminton Campaz' },
            { gift: 'Crown', player: 'Vinícius Júnior' },
            { gift: 'Motorcycle', player: 'Matheus Cunha' },
            { gift: 'Jet', player: 'Kylian Mbappé' },
            { gift: 'Lion', player: 'Erling Haaland' },
            { gift: 'Meteor', player: 'Harry Kane' },
            { gift: 'Whale', player: 'Kai Havertz' },
            { gift: 'Trophy', player: 'Cody Gakpo' },
            { gift: 'Castle', player: 'Jude Bellingham' },
            { gift: 'Fire', player: 'Viktor Gyökeres' }
        ];

        const grid = document.getElementById('grid-botones');
        const inputUser = document.getElementById('input-user');

        regalosActivos.forEach(item => {
            const btn = document.createElement('button');
            btn.className = 'btn-test';
            btn.innerHTML = `🎁 <strong>${item.gift}</strong> <span class="player">⚽ ${item.player}</span>`;
            btn.onclick = () => enviarSimulacion(item.gift);
            grid.appendChild(btn);
        });

        function enviarSimulacion(regalo) {
            socket.emit('simular-regalo', {
                usuario: inputUser.value.trim() || "Espectador",
                regalo: regalo
            });
        }

        function cambiarNombre() {
            const nombres = ['LuisFer_Py', 'GoleadorFiel', 'AlbirrojaCrack', 'SocioWholesale', 'NandoDev'];
            inputUser.value = nombres[Math.floor(Math.random() * nombres.length)] + (Math.floor(Math.random() * 900) + 100);
        }
    </script>
</body>
</html>
