<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Simulación de Goles</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #141419;
            color: #f5f5f7;
            padding: 40px;
            margin: 0;
        }
        .container {
            max-width: 950px;
            margin: 0 auto;
            background: #1e1e24;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        h1 { color: #00ffcc; margin-top: 0; text-align: center; }
        .config-box {
            background: #282830;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        input[type="text"] {
            padding: 10px;
            font-size: 15px;
            border-radius: 5px;
            border: 1px solid #444;
            background: #141419;
            color: #fff;
            width: 250px;
        }
        button.action-btn {
            padding: 10px 15px;
            background: #4a4e69;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button.action-btn:hover { background: #5a5f80; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 15px;
        }
        .btn-test {
            padding: 15px;
            background: #2d3047;
            color: white;
            border: 2px solid #3c405c;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }
        .btn-test:hover {
            border-color: #00ffcc;
            background: #343854;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0,255,204,0.2);
        }
        .player {
            display: block;
            font-size: 12px;
            color: #a0a5c0;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🧪 Entorno de Pruebas Manuales</h1>
        <p style="color: #bbb; text-align: center;">Usa este panel para asegurarte de que los videos cargan correctamente en el overlay sin tener que iniciar directo.</p>
        
        <div class="config-box">
            <label for="input-user"><strong>Nombre de Usuario a simular:</strong></label>
            <input type="text" id="input-user" value="Fanatico_Py99">
            <button class="action-btn" onclick="cambiarNombreAleatorio()">🎲 Nombre Azar</button>
        </div>

        <h3>Elige un regalo para lanzar su gol correspondiente:</h3>
        <div class="grid" id="grid-botones"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        // Estructura exacta de tus 18 configuraciones activas
        const regalosActivos = [
            { gift: 'Rose', player: 'Matías Galarza (Paraguay)' },
            { gift: 'Doughnut', player: 'Maurício (Paraguay)' },
            { gift: 'TikTok', player: 'Lionel Messi (Argentina)' },
            { gift: 'Ice Cream', player: 'Luis Díaz (Colombia)' },
            { gift: 'Panda', player: 'Raúl Jiménez (México)' },
            { gift: 'Love Letter', player: 'Luis Romo (México)' },
            { gift: 'Perfume', player: 'Julián Quiñones (México)' },
            { gift: 'Corgi', player: 'Maximiliano Araújo (Uruguay)' },
            { gift: 'Mirror', player: 'Jaminton Campaz (Colombia)' },
            { gift: 'Crown', player: 'Vinícius Júnior (Brasil)' },
            { gift: 'Motorcycle', player: 'Matheus Cunha (Brasil)' },
            { gift: 'Jet', player: 'Kylian Mbappé (Francia)' },
            { gift: 'Lion', player: 'Erling Haaland (Noruega)' },
            { gift: 'Meteor', player: 'Harry Kane (Inglaterra)' },
            { gift: 'Whale', player: 'Kai Havertz (Alemania)' },
            { gift: 'Trophy', player: 'Cody Gakpo (Países Bajos)' },
            { gift: 'Castle', player: 'Jude Bellingham (Inglaterra)' },
            { gift: 'Fire', player: 'Viktor Gyökeres (Suecia)' }
        ];

        const grid = document.getElementById('grid-botones');
        const inputUser = document.getElementById('input-user');

        regalosActivos.forEach(item => {
            const btn = document.createElement('button');
            btn.className = 'btn-test';
            btn.innerHTML = `🎁 <strong>${item.gift}</strong> <span class="player">⚽ ${item.player}</span>`;
            btn.onclick = () => enviarSimulacion(item.gift);
            grid.appendChild(btn);
        });

        function enviarSimulacion(regalo) {
            const userName = inputUser.value.trim() || "Espectador";
            socket.emit('simular-regalo', {
                usuario: userName,
                regalo: regalo
            });
        }

        function cambiarNombreAleatorio() {
            const nombres = ['LuisFer_Py', 'GoleadorFiel', 'AlbirrojaCrack', 'SocioWholesale', 'NandoDev', 'ZlatanFan'];
            const num = Math.floor(Math.random() * 900) + 100;
            inputUser.value = nombres[Math.floor(Math.random() * nombres.length)] + num;
        }
    </script>
</body>
</html>
